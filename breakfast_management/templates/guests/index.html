<!DOCTYPE html>
<html xmlns:py="http://genshi.edgewall.org/" py:extends="'master.html'">
<py:block name="title">住客登记 - 民宿早餐备餐与配送管理系统</py:block>
<py:block name="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-0"><i class="bi bi-people me-2 text-primary"></i>住客登记</h3>
            <small class="text-muted">管理住客信息与早餐需求</small>
        </div>
        <a href="/guests/new" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>新增住客
        </a>
    </div>

    <div class="card p-3 mb-4">
        <form method="GET" action="/guests" class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label small text-muted">关键词</label>
                <input type="text" name="keyword" class="form-control" placeholder="姓名/电话/身份证" value="${filters.get('keyword', '')}">
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted">房间</label>
                <select name="room_id" class="form-select">
                    <option value="">全部</option>
                    <option py:for="r in rooms" value="${r.id}" ${'selected' if filters.get('room_id') == str(r.id) else ''}>${r.room_number}</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted">状态</label>
                <select name="status" class="form-select">
                    <option value="">全部</option>
                    <option value="checked_in" ${'selected' if filters.get('status') == 'checked_in' else ''}>在住</option>
                    <option value="checked_out" ${'selected' if filters.get('status') == 'checked_out' else ''}>已退房</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search me-1"></i>筛选</button>
            </div>
            <div class="col-md-2">
                <a href="/guests" class="btn btn-outline-secondary w-100">重置</a>
            </div>
        </form>
    </div>

    <div class="card">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>姓名</th>
                    <th>电话</th>
                    <th>房间</th>
                    <th>入住日期</th>
                    <th>退房日期</th>
                    <th>早餐</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr py:if="not guests">
                    <td colspan="8" class="text-center text-muted py-4">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>暂无数据
                    </td>
                </tr>
                <tr py:for="g in guests">
                    <td class="fw-bold">${g.name}</td>
                    <td>${g.phone or '-'}</td>
                    <td><span class="badge bg-info text-dark">${g.room.room_number if g.room else '-'}</span></td>
                    <td>${g.check_in_date.strftime('%Y-%m-%d')}</td>
                    <td>${g.check_out_date.strftime('%Y-%m-%d') if g.check_out_date else '-'}</td>
                    <td>
                        <py:choose>
                            <py:when test="g.breakfast_included">
                                <span class="badge bg-success">含早</span>
                                <py:if test="g.package_type">
                                    <small class="text-muted ms-1">${g.package_type.name}</small>
                                </py:if>
                            </py:when>
                            <py:otherwise><span class="badge bg-secondary">不含</span></py:otherwise>
                        </py:choose>
                    </td>
                    <td>
                        <py:choose>
                            <py:when test="g.status == 'checked_in'"><span class="badge bg-primary">在住</span></py:when>
                            <py:when test="g.status == 'checked_out'"><span class="badge bg-secondary">已退房</span></py:when>
                        </py:choose>
                    </td>
                    <td>
                        <a href="/guests/${g.id}/edit" class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a href="/guests/${g.id}/delete" class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('确定删除该住客记录吗？')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</py:block>
</html>
