<!DOCTYPE html>
<html xmlns:py="http://genshi.edgewall.org/" py:extends="'master.html'">
<py:block name="title">${'编辑' if guest else '新增'}住客 - 民宿早餐备餐与配送管理系统</py:block>
<py:block name="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-0">
                <i class="bi bi-people me-2 text-primary"></i>
                ${'编辑住客' if guest else '新增住客'}
            </h3>
            <small class="text-muted"><a href="/guests" class="text-decoration-none">&larr; 返回列表</a></small>
        </div>
    </div>

    <div class="card p-4">
        <form method="POST" action="${f'/guests/{guest.id}/update' if guest else '/guests/create'}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">姓名 <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" required
                           value="${guest.name if guest else ''}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">联系电话</label>
                    <input type="text" name="phone" class="form-control"
                           value="${guest.phone if guest else ''}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">身份证号</label>
                    <input type="text" name="id_card" class="form-control"
                           value="${guest.id_card if guest else ''}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">房间 <span class="text-danger">*</span></label>
                    <select name="room_id" class="form-select" required>
                        <option value="">请选择房间</option>
                        <option py:for="r in rooms" value="${r.id}"
                                ${'selected' if guest and guest.roomID == r.id else ''}>
                            ${r.room_number} - 
                            <py:choose>
                                <py:when test="r.room_type == 'single'">单人间</py:when>
                                <py:when test="r.room_type == 'double'">双人间</py:when>
                                <py:when test="r.room_type == 'suite'">套房</py:when>
                                <py:when test="r.room_type == 'family'">家庭房</py:when>
                            </py:choose>
                        </option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">入住日期</label>
                    <input type="date" name="check_in_date" class="form-control"
                           value="${guest.check_in_date.isoformat() if guest else ''}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">退房日期</label>
                    <input type="date" name="check_out_date" class="form-control"
                           value="${guest.check_out_date.isoformat() if guest and guest.check_out_date else ''}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">状态</label>
                    <select name="status" class="form-select">
                        <option value="checked_in" ${'selected' if (not guest) or guest.status == 'checked_in' else ''}>在住</option>
                        <option value="checked_out" ${'selected' if guest and guest.status == 'checked_out' else ''}>已退房</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">早餐套餐</label>
                    <select name="package_type_id" class="form-select">
                        <option value="">不指定</option>
                        <option py:for="p in packages" value="${p.id}"
                                ${'selected' if guest and guest.package_typeID == p.id else ''}>
                            ${p.code} - ${p.name}
                        </option>
                    </select>
                </div>
                <div class="col-md-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="breakfast_included" id="breakfast_included"
                               ${'checked' if (not guest) or guest.breakfast_included else ''}>
                        <label class="form-check-label" for="breakfast_included">含早餐服务</label>
                    </div>
                </div>
                <div class="col-md-12">
                    <label class="form-label">备注</label>
                    <textarea name="notes" class="form-control" rows="2">${guest.notes if guest else ''}</textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary me-2">
                    <i class="bi bi-check-lg me-1"></i>${'保存' if guest else '登记住客'}
                </button>
                <a href="/guests" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</py:block>
</html>
