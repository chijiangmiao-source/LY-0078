<!DOCTYPE html>
<html xmlns:py="http://genshi.edgewall.org/" py:extends="'master.html'">
<py:block name="title">登记退回 - 民宿早餐备餐与配送管理系统</py:block>
<py:block name="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-0">
                <i class="bi bi-arrow-return-left me-2 text-info"></i>登记餐篮退回
            </h3>
            <small class="text-muted"><a href="/deliveries" class="text-decoration-none">&larr; 返回配送列表</a></small>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card p-4">
                <div class="alert alert-warning mb-4">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    <strong>约束提示：</strong>退回时间不能早于送达时间。
                </div>
                <div class="mb-3 p-3 bg-light rounded">
                    <div class="row g-2">
                        <div class="col-md-6">
                            <small class="text-muted">配送单号</small>
                            <div class="fw-bold">${delivery.delivery_no}</div>
                        </div>
                        <div class="col-md-6">
                            <small class="text-muted">房间</small>
                            <div><span class="badge bg-info text-dark">${delivery.room.room_number}</span></div>
                        </div>
                        <div class="col-md-6">
                            <small class="text-muted">餐篮</small>
                            <div class="fw-medium">${delivery.basket.basket_code}</div>
                        </div>
                        <div class="col-md-6">
                            <small class="text-muted">送达时间</small>
                            <div>${delivery.delivered_at.strftime('%Y-%m-%d %H:%M:%S') if delivery.delivered_at else '-'}</div>
                        </div>
                    </div>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">退回时间</label>
                        <input type="datetime-local" name="returned_at" class="form-control">
                        <small class="text-muted">留空则使用当前时间</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">退回备注</label>
                        <textarea name="notes" class="form-control" rows="3" placeholder="餐篮状况、退回原因等"></textarea>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-info me-2">
                            <i class="bi bi-check-lg me-1"></i>确认退回
                        </button>
                        <a href="/deliveries" class="btn btn-outline-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</py:block>
</html>
