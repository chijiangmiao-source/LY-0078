<!DOCTYPE html>
<html xmlns:py="http://genshi.edgewall.org/" py:extends="'master.html'">
<py:block name="title">${'编辑' if package else '新增'}套餐 - 民宿早餐备餐与配送管理系统</py:block>
<py:block name="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-0">
                <i class="bi bi-card-list me-2 text-primary"></i>
                ${'编辑套餐' if package else '新增套餐'}
            </h3>
            <small class="text-muted"><a href="/packages" class="text-decoration-none">&larr; 返回列表</a></small>
        </div>
    </div>

    <div class="card p-4">
        <form method="POST" action="${f'/packages/{package.id}/update' if package else '/packages/create'}">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">套餐编号 <span class="text-danger">*</span></label>
                    <input type="text" name="code" class="form-control" required
                           value="${package.code if package else ''}" placeholder="如：SET001">
                </div>
                <div class="col-md-4">
                    <label class="form-label">套餐名称 <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" required
                           value="${package.name if package else ''}" placeholder="如：中式经典早餐">
                </div>
                <div class="col-md-4">
                    <label class="form-label">价格 (元)</label>
                    <input type="number" name="price" class="form-control" min="0"
                           value="${package.price if package else 0}">
                </div>
                <div class="col-md-12">
                    <label class="form-label">包含餐品</label>
                    <textarea name="items" class="form-control" rows="2"
                              placeholder="如：白粥、包子、鸡蛋、小菜">${package.items if package else ''}</textarea>
                </div>
                <div class="col-md-12">
                    <label class="form-label">描述</label>
                    <textarea name="description" class="form-control" rows="2">${package.description if package else ''}</textarea>
                </div>
                <div class="col-md-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
                               ${'checked' if (not package) or package.is_active else ''}>
                        <label class="form-check-label" for="is_active">启用该套餐</label>
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary me-2">
                    <i class="bi bi-check-lg me-1"></i>${'保存修改' if package else '创建套餐'}
                </button>
                <a href="/packages" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</py:block>
</html>
