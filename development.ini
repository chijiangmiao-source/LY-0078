[DEFAULT]
debug = true
smtp_server = localhost

[server:main]
use = egg:gearbox#wsgiref
host = 0.0.0.0
port = 8080

[app:main]
use = egg:breakfast_management
pyramid.includes =
    pyramid_debugtoolbar

sqlalchemy.url = mysql://root:password@localhost:3306/breakfast_management?charset=utf8mb4
sqlobject.dburi = mysql://root:password@localhost:3306/breakfast_management?charset=utf8mb4&debug=false

beaker.session.key = breakfast_management
beaker.session.secret = breakfast_management_secret_key_change_in_production
beaker.session.type = cookie
beaker.session.validate_key = breakfast_management_validation_key

auth.sa.form = tg.pylons_lib.fastform:FastForm

[/]
tools.sessions.on = True
tools.auth_basic.on = False
tools.tg.static_filter.on = True
tools.etag.on = True
tools.directory.on = False

[/css]
tools.staticdir.on = True
tools.staticdir.dir = %(here)s/breakfast_management/public/css

[/js]
tools.staticdir.on = True
tools.staticdir.dir = %(here)s/breakfast_management/public/js

[/img]
tools.staticdir.on = True
tools.staticdir.dir = %(here)s/breakfast_management/public/img

[logging]
level = INFO
